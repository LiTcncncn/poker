<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Poker Main · pen 复刻（静态对照）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* 来源：pencil/pencil-new.pen 节点 xxSlZ「Poker Main - V1 深色竞技」— 无逻辑，仅视觉对照 */
    :root {
      --bg: #0a0f1e;
      --top-grad-0: #16233e;
      --top-grad-1: #111a2f;
      --top-stroke: #25324d;
      --main-grad-0: #0b1222;
      --main-grad-1: #0a0f1e;
      --text-top: #eaf1ff;
      --coin: #facc15;
      --gem: #22d3ee;
      --zap: #60a5fa;
      --bar-bg: #1c2942;
      --bar-fg0: #22d3ee;
      --bar-fg1: #3b82f6;
      --gold0: #111827;
      --gold1: #0b1220;
      --amber: #f59e0b;
      --result-title: #e2e8f0;
      --money: #34d399;
      --hint: #94a3b8;
      --nav-grad-0: #111a2f;
      --nav-grad-1: #0d1527;
      --nav-stroke: #223353;
      --nav-muted: #8fa7d6;
      --nav-craft: #c9a7ff;
      --btn-blue0: #3b82f6;
      --btn-blue1: #1d4ed8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      font-family: Inter, system-ui, sans-serif;
    }
    /* 画板 xxSlZ：390×844；刘海区 47、Home 区 34 分别在顶栏/底栏容器内用 padding 留出 */
    .device {
      width: 390px;
      min-height: 844px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,.45);
    }
    /* —— 顶栏 0L5HX：上内边距 47+16，背景盖住状态栏区域，内容在安全区内 —— */
    .top {
      width: 100%;
      background: linear-gradient(180deg, var(--top-grad-0) 0%, var(--top-grad-1) 100%);
      border-bottom: 1px solid var(--top-stroke);
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 63px 16px 16px;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat .ico { width: 16px; height: 16px; flex-shrink: 0; }
    .stat .val {
      color: var(--text-top);
      font-size: 18px;
      font-weight: 800;
    }
    .energy-col { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
    .energy-row { display: flex; align-items: center; gap: 6px; }
    .bar-track {
      width: 96px;
      height: 8px;
      background: var(--bar-bg);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      width: 76px;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--bar-fg0), var(--bar-fg1));
    }

    /* —— 主区 WJbVs —— */
    .main {
      flex: 1;
      width: 100%;
      background: linear-gradient(180deg, var(--main-grad-0) 0%, var(--main-grad-1) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      padding: 6px 12px 18px;
      min-height: 0;
    }

    /* OVRX4 超级牌解锁卡 */
    .unlock-card {
      width: 240px;
      background: linear-gradient(180deg, var(--gold0) 0%, var(--gold1) 100%);
      border-radius: 18px;
      border: 1px solid var(--amber);
      box-shadow: 0 12px 22px rgba(245, 158, 11, 0.2);
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .unlock-card h2 {
      color: #fde68a;
      font-size: 30px;
      font-weight: 900;
    }
    .pill {
      background: #0b1220;
      border: 1px solid var(--amber);
      border-radius: 12px;
      padding: 9px 16px;
      color: #fde68a;
      font-size: 16px;
      font-weight: 800;
    }
    /* 与 pen iCU9g 一致：120×180 的 75% → 90×135，三行 52/45/38 */
    .preview-card {
      width: 90px;
      height: 135px;
      border-radius: 12px;
      border: 2px solid #fde68a;
      background: linear-gradient(180deg, #fff 0%, #a5d8f7 42%, #f5c7f0 100%);
      box-shadow: 0 5px 12px rgba(245, 158, 11, 0.13);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pc-rank {
      height: 52px;
      padding: 0 11px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      color: #0f172a;
      font-size: 36px;
      font-weight: 900;
    }
    .pc-suit {
      height: 45px;
      padding: 0 8px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      color: #0f172a;
      font-size: 33px;
      font-weight: 900;
    }
    .pc-bot { flex: 1; min-height: 0; }
    .unlock-btn {
      width: 100%;
      border-radius: 12px;
      padding: 11px 16px;
      text-align: center;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      background: linear-gradient(90deg, #f59e0b, #fde68a);
    }

    /* 结算 XBiqY / secB */
    .result {
      width: 100%;
      max-width: 366px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .result-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-top: -8px; /* gap: -8 视觉收紧 */
    }
    .result-title {
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 44px;
      font-weight: 800;
      color: var(--result-title);
      line-height: 1;
    }
    .result-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      flex-wrap: wrap;
    }
    .result-money {
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 24px;
      font-weight: 900;
      color: var(--money);
    }
    .result-hint {
      font-size: 14px;
      font-weight: 600;
      color: var(--hint);
    }

    /* 手牌 A1T16 */
    .hand {
      width: 100%;
      max-width: 366px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .mini-card {
      width: 66px;
      height: 96px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .mini-card .row-r {
      height: 36px;
      padding: 0 8px;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      font-size: 26px;
      font-weight: 900;
    }
    .mini-card .row-s {
      height: 32px;
      padding: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
    }
    .mini-card .row-x {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
    }
    .c-yellow { background: #fff8d6; border: 2px solid #facc15; color: #0f172a; }
    .c-yellow .red { color: #be123c; }
    .c-cyan { background: #bfeffb; border: 2px solid #38bdf8; color: #0f172a; }
    .c-cyan .fx { color: #22c55e; }
    .c-purple { background: #f3e8ff; border: 2px solid #c084fc; color: #0f172a; }
    .c-purple .fx { color: #ef4444; }
    .c-purple .small-rank { font-size: 20px; }
    /* 与牌库 attrCrossJQK 一致：跨数值 JQK 手牌 Twvr4 */
    .c-jqk-attr {
      background: linear-gradient(180deg, #fffbeb 0%, #fde68a 50%, #fef3c7 100%);
      border: 2px solid #d97706;
      box-shadow: 0 3px 8px rgba(217, 119, 6, 0.2);
      color: #0f172a;
    }
    .c-jqk-attr .jqk-rank {
      /* 与 pen RELm8：♥ 牌 JQK 用红心色 */
      color: #be123c;
      font-size: 25px;
      letter-spacing: -0.04em;
      width: 100%;
      justify-content: center;
    }
    .c-jqk-attr .row-s.red { color: #be123c; }
    .c-jqk-attr .fx-amber { color: #b45309; }

    /* 控制 DvxSy */
    .ctrl {
      width: 100%;
      max-width: 366px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-main {
      flex: 1;
      border-radius: 14px;
      padding: 13px 14px;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(90deg, var(--btn-blue0), var(--btn-blue1));
      box-shadow: 0 8px 18px rgba(29, 78, 216, 0.4);
    }
    .btn-side {
      width: 98px;
      height: 55px;
      border-radius: 14px;
      border: 1px solid #64748b;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 底栏 YYnEy：下内边距 12+34，背景延至 Home 指示条区，图标在安全区之上 */
    .nav {
      width: 100%;
      background: linear-gradient(180deg, var(--nav-grad-0) 0%, var(--nav-grad-1) 100%);
      border-top: 1px solid var(--nav-stroke);
      padding: 8px 14px 46px;
      display: flex;
      justify-content: center;
    }
    .nav-inner {
      width: 350px;
      max-width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .nav-item {
      width: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .nav-ico-row {
      position: relative;
      width: 70px;
      height: 26px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 0;
    }
    .nav-ico-row .ico { width: 26px; height: 26px; }
    .nav-dot {
      position: absolute;
      top: -2px;
      right: 6px;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
    }
    .nav-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--nav-muted);
      text-align: center;
    }
    .nav-label.craft { color: var(--nav-craft); font-weight: 700; }

    .note {
      margin-top: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #64748b;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="device" aria-label="pen xxSlZ 390×844 · safe 在顶/底栏 padding 内">
    <!-- 顶栏 -->
    <header class="top">
      <div class="top-row">
        <div class="stat">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="var(--coin)" stroke-width="2"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 3"/></svg>
          <span class="val">125000</span>
        </div>
        <div class="stat">
          <svg class="ico" viewBox="0 0 24 24" fill="var(--gem)" stroke="var(--gem)" stroke-width="2"><path d="M6 3h12l4 6-10 13L2 9Z"/></svg>
          <span class="val">428</span>
        </div>
        <div class="energy-col">
          <div class="energy-row">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="var(--zap)" stroke-width="2"><path d="M4 14.5A2.5 2.5 0 0 1 6.5 12H8a2 2 0 0 1 1.7.9l2.6 3.9a2 2 0 0 0 1.7.9h1.5a2.5 2.5 0 0 0 2.5-2.5V12"/><path d="M6 12h1.5a2 2 0 0 0 2-2V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v10"/></svg>
            <span class="val">4/5</span>
          </div>
          <div class="bar-track"><div class="bar-fill"></div></div>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- OVRX4 -->
      <section class="unlock-card">
        <h2>♠ ♣ 成花</h2>
        <div class="pill">同花 13/30</div>
        <div class="preview-card">
          <div class="pc-rank">A</div>
          <div class="pc-suit">♠</div>
          <div class="pc-bot"></div>
        </div>
        <div class="unlock-btn">$118,500 解锁</div>
      </section>

      <!-- XBiqY 结算 -->
      <section class="result">
        <div class="result-inner">
          <div class="result-title">2 PAIRS</div>
          <div class="result-row">
            <span class="result-money">$450</span>
            <span class="result-hint">(基础 x3 + 加成 x3)</span>
          </div>
        </div>
      </section>

      <!-- A1T16 五张牌 -->
      <section class="hand">
        <div class="mini-card c-yellow">
          <div class="row-r">Q</div>
          <div class="row-s">♠</div>
          <div class="row-x"></div>
        </div>
        <div class="mini-card c-cyan">
          <div class="row-r">10</div>
          <div class="row-s">♣</div>
          <div class="row-x fx">+10</div>
        </div>
        <div class="mini-card c-yellow">
          <div class="row-r red">6</div>
          <div class="row-s red">♦</div>
          <div class="row-x"></div>
        </div>
        <div class="mini-card c-jqk-attr">
          <div class="row-r jqk-rank">JQK</div>
          <div class="row-s red">♥</div>
          <div class="row-x fx-amber">x3</div>
        </div>
        <div class="mini-card c-purple">
          <div class="row-r red">10</div>
          <div class="row-s red">♥</div>
          <div class="row-x fx">+10</div>
        </div>
      </section>

      <!-- DvxSy -->
      <section class="ctrl">
        <div class="btn-main">下一手</div>
        <div class="btn-side">▶ 自动</div>
      </section>
    </main>

    <!-- YYnEy -->
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-item">
          <div class="nav-ico-row">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="var(--nav-muted)" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span class="nav-dot"></span>
          </div>
          <span class="nav-label">牌池</span>
        </div>
        <div class="nav-item">
          <div class="nav-ico-row">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="var(--nav-muted)" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            <span class="nav-dot"></span>
          </div>
          <span class="nav-label">成就</span>
        </div>
        <div class="nav-item">
          <div class="nav-ico-row">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="var(--nav-muted)" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span class="nav-dot"></span>
          </div>
          <span class="nav-label">抽卡</span>
        </div>
        <div class="nav-item">
          <div class="nav-ico-row">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="var(--nav-craft)" stroke-width="2"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></svg>
            <span class="nav-dot"></span>
          </div>
          <span class="nav-label craft">合成</span>
        </div>
        <div class="nav-item">
          <div class="nav-ico-row">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="var(--nav-muted)" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
            <span class="nav-dot"></span>
          </div>
          <span class="nav-label">统计</span>
        </div>
      </div>
    </nav>

    <p class="note">静态对照稿 · 数据与文案取自 pencil-new.pen（xxSlZ）<br />未包含 enabled:false 的 unlockPanel / modePanel · 可直接用浏览器打开本文件叠图校验</p>
  </div>
</body>
</html>
